<head>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#4facfe,#00f2fe);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:750px;
      background:white;
      border-radius:12px;
      padding:25px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    .chapter-list{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    .chapter-btn{
      padding:15px;
      border:none;
      border-radius:10px;
      background:#4facfe;
      color:white;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    .chapter-btn:hover{
      background:#2196f3;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      margin-bottom:15px;
      font-weight:bold;
      color:#444;
    }

    .question{
      font-size:22px;
      margin-bottom:20px;
      font-weight:bold;
    }

    .options{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .option{
      padding:14px;
      background:#f2f2f2;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
      border:2px solid transparent;
    }

    .option:hover{
      background:#e6f2ff;
      border-color:#4facfe;
    }

    .correct{
      background:#c8f7c5;
      border-color:green;
    }

    .wrong{
      background:#ffc9c9;
      border-color:red;
    }

    .controls{
      display:flex;
      justify-content:space-between;
      margin-top:20px;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      background:#4facfe;
      color:white;
      font-size:15px;
    }

    button:hover{
      background:#2196f3;
    }

    .hint{
      margin-top:15px;
      padding:10px;
      border-radius:6px;
      background:#fff3cd;
      color:#856404;
      display:none;
    }

    .back-btn{
      background:#555;
    }

    .back-btn:hover{
      background:#333;
    }
  </style>
</head>

<body>

<div class="container" id="app">

    </div>

</div>

  const chapters = [...new Set(quizData.map(q => q.Chapter))];

  // SHOW CHAPTER BUTTONS
  chapters.forEach(chapter => {

    const btn = document.createElement("button");

    btn.classList.add("chapter-btn");

    btn.innerText = chapter;

    btn.onclick = () => startQuiz(chapter);

    chapterList.appendChild(btn);
  });

  // START QUIZ
  function startQuiz(chapter){

    selectedChapter = chapter;

    filteredQuestions = quizData.filter(
      q => q.Chapter === chapter
    );

    currentQuestion = 0;
    score = 0;

    chapterScreen.style.display = "none";
    quizScreen.style.display = "block";

    loadQuestion();
  }

  // LOAD QUESTION
  function loadQuestion(){

    answered = false;

    const q = filteredQuestions[currentQuestion];

    chapterTitle.innerText = selectedChapter;

    questionNumber.innerText =
      `Question ${currentQuestion + 1} / ${filteredQuestions.length}`;

    scoreBoard.innerText = `Score: ${score}`;

    questionEl.innerText = q.Question;

    hintEl.style.display = "none";
    hintEl.innerText = q.Hint;

    optionsEl.innerHTML = "";

    const options = [
      q.Option1,
      q.Option2,
      q.Option3,
      q.Option4
    ];

    options.forEach(option => {

      const div = document.createElement("div");

      div.classList.add("option");

      div.innerText = option;

      div.onclick = () => checkAnswer(div, option);

      optionsEl.appendChild(div);
    });
  }

  // CHECK ANSWER
  function checkAnswer(selectedOption, selectedAnswer){

    if(answered) return;

    answered = true;

    const originalIndex = quizData.findIndex(
      q =>
      q.Question === filteredQuestions[currentQuestion].Question
    );

    const correctAnswer = correctAnswers[originalIndex];

    const allOptions = document.querySelectorAll(".option");

    allOptions.forEach(option => {

      if(option.innerText === correctAnswer){
        option.classList.add("correct");
      }

      if(
        option.innerText === selectedAnswer &&
        selectedAnswer !== correctAnswer
      ){
        option.classList.add("wrong");
      }
    });

    if(selectedAnswer === correctAnswer){
      score++;
      scoreBoard.innerText = `Score: ${score}`;
    }
  }

  // NEXT BUTTON
  nextBtn.onclick = () => {

    currentQuestion++;

    if(currentQuestion < filteredQuestions.length){

      loadQuestion();

    } else {

      showResult();
    }
  };

  // HINT BUTTON
  hintBtn.onclick = () => {

    hintEl.style.display = "block";
  };

  // BACK BUTTON
  backBtn.onclick = () => {

    quizScreen.style.display = "none";
    chapterScreen.style.display = "block";
  };

  // SHOW RESULT
  function showResult(){

    quizScreen.innerHTML = `
      <h1>Quiz Completed 🎉</h1>

      <h2 style="text-align:center; margin-top:20px;">
        ${selectedChapter}
      </h2>

      <h2 style="text-align:center; margin:20px 0;">
        Score: ${score} / ${filteredQuestions.length}
      </h2>

      <div style="text-align:center;">
        <button onclick="location.reload()">
          Back To Chapters
        </button>
      </div>
    `;
  }

</script>

</body>
</html>
